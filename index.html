<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESTA Fast Food</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #070707;
      color: #f7f2dd;
    }

    * {
      box-sizing: border-box;
    }

    .page {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 24px 32px 40px;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(7, 7, 7, 0.96);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .loading-screen.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .loading-panel {
      width: min(480px, 90vw);
      display: grid;
      gap: 18px;
      padding: 32px;
      border-radius: 28px;
      background: rgba(14, 14, 14, 0.98);
      border: 1px solid rgba(243, 203, 86, 0.18);
      box-shadow: 0 36px 100px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .loading-panel .spinner {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      border: 6px solid rgba(243, 203, 86, 0.22);
      border-top-color: #f7c654;
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }

    .loading-panel .loading-text {
      margin: 0;
      color: #f7f2dd;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .loading-panel .skeleton-grid {
      display: grid;
      gap: 14px;
    }

    .loading-panel .skeleton-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      position: relative;
    }

    .loading-panel .skeleton-line,
    .loading-panel .skeleton-pill {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }

    .loading-panel .skeleton-pill {
      width: 100px;
      height: 14px;
      margin-bottom: 8px;
    }

    .loading-panel .skeleton-line.short {
      width: 55%;
    }

    .loading-panel .skeleton-line.medium {
      width: 80%;
    }

    .loading-panel .skeleton-line.long {
      width: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(243, 203, 86, 0.14), transparent 20%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.05), transparent 18%),
        linear-gradient(180deg, #080808 0%, #0f0f0f 38%, #070707 100%);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(243, 203, 86, 0.18), transparent 18%),
        radial-gradient(circle at 85% 15%, rgba(234, 166, 74, 0.12), transparent 20%),
        radial-gradient(circle at 50% 90%, rgba(255, 255, 255, 0.06), transparent 25%);
      pointer-events: none;
      opacity: 0.9;
      animation: drift 18s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0px, 0px) scale(1); }
      to { transform: translate(20px, -18px) scale(1.02); }
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 24px 28px;
      border: 1px solid rgba(243, 203, 86, 0.16);
      border-radius: 28px;
      background: rgba(14, 14, 14, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.34);
      transform-style: preserve-3d;
      animation: floatCard 14s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateZ(0px); }
      50% { transform: translateZ(8px); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-logo img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 20px;
      border: 1px solid rgba(243, 203, 86, 0.2);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand-title h1 {
      margin: 0;
      font-size: clamp(2.4rem, 3vw, 3.4rem);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .brand-title h1 span {
      color: #f4d27c;
    }

    .brand-subtitle {
      color: #d8b46d;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(243, 203, 86, 0.2);
      background: rgba(243, 203, 86, 0.14);
      color: #2c1f0d;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .search-wrap {
      display: grid;
      gap: 14px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 18px;
      border: 1px solid rgba(243, 203, 86, 0.18);
      background: rgba(243, 203, 86, 0.05);
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      color: #fefefe;
      background: transparent;
      font-size: 1rem;
      min-height: 40px;
    }

    .search-box input::placeholder {
      color: #e5d89f;
    }

    .search-box svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      color: #e5d89f;
    }

    .category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 2px;
    }

    .category-btn {
      border: 1px solid rgba(243, 203, 86, 0.16);
      background: rgba(243, 203, 86, 0.07);
      color: #f1e8c2;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
      font-size: 0.94rem;
      white-space: nowrap;
    }

    .category-btn:hover {
      transform: translateY(-1px);
      background: rgba(243, 203, 86, 0.14);
      color: #111;
    }

    .category-btn.active {
      background: linear-gradient(135deg, #f5d170, #d9aa3f);
      color: #111;
      border-color: rgba(243, 203, 86, 0.34);
    }

    .menu-grid {
      margin-top: 22px;
      display: grid;
      gap: 28px;
    }

    .category-section {
      position: relative;
      display: grid;
      gap: 16px;
      padding: 18px 20px 24px;
      border-radius: 26px;
      border: 1px solid rgba(243, 203, 86, 0.16);
      background: rgba(14, 12, 18, 0.94);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .category-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.03), transparent 30%);
      pointer-events: none;
      opacity: 0.8;
    }

    .category-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-title-section {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
      color: #f8d973;
    }

    .category-meta {
      color: #e9d59b;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .category-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .dish-card {
      border-radius: 24px;
      padding: 22px;
      background: rgba(12, 12, 15, 0.96);
      border: 1px solid rgba(243, 203, 86, 0.14);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      display: grid;
      gap: 18px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, opacity 0.25s ease;
      transform-style: preserve-3d;
      opacity: 0;
      transform: translateY(16px);
      animation: cardAppear 0.45s ease forwards;
    }

    .dish-card:hover {
      transform: translateY(-8px) rotateX(2deg) scale(1.01);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
      background: rgba(24, 18, 20, 0.98);
    }

    @keyframes cardAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    .dish-card:hover .price-pill {
      background: rgba(255, 255, 255, 0.08);
    }

    .dish-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(243, 203, 86, 0.18);
      color: #f3d778;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      font-weight: 700;
      width: fit-content;
    }

    .dish-name {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .dish-description {
      margin: 0;
      color: #dacf9f;
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .price-grid {
      display: grid;
      gap: 12px;
    }

    .price-pill {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(243, 203, 86, 0.18);
      background: rgba(243, 203, 86, 0.05);
    }

    .size-name {
      color: #e6d5a4;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .size-value {
      color: #f7c654;
      font-weight: 800;
      font-size: 1rem;
      text-align: right;
    }

    .no-results {
      grid-column: 1 / -1;
      padding: 30px;
      text-align: center;
      color: #e9dcb4;
      border: 1px dashed rgba(243, 203, 86, 0.2);
      border-radius: 18px;
      background: rgba(243, 203, 86, 0.03);
    }

    @media (max-width: 720px) {
      .page {
        width: calc(100% - 20px);
      }

      .hero {
        padding: 20px;
      }

      .price-pill {
        grid-template-columns: 1fr;
        row-gap: 10px;
      }
    }
  </style>
</head>

      { category: 'Sides', badge: 'Sides', name: 'French Fries', prices: { Single: 'Rs. 700' } },

      { category: 'Party Packs', badge: 'Party Pack', name: 'Pack 1', prices: { '5 Person': 'Rs. 4,300' }, description: 'Plain Rice + Chicken/Fish/Prawns, Tempered Potato, Chashuwy Curry, Cutlet, Salad, Papadam' },
      { category: 'Party Packs', badge: 'Party Pack', name: 'Pack 2', prices: { '5 Person': 'Rs. 4,500' }, description: 'Egg Rice + Seafood Devil/Mix Devil, Cutlet, Chilly Paste, Chopsey, Batu Moju, Butter Mushroom' },

      { category: 'Add-ons', badge: 'Add-on', name: 'Drumstick', prices: { Single: 'Rs. 250' } },
      { category: 'Add-ons', badge: 'Add-on', name: 'Chicken Curry', prices: { Single: 'Rs. 300' } },
      { category: 'Add-ons', badge: 'Add-on', name: 'Fish Curry', prices: { Single: 'Rs. 250' } },
      { category: 'Add-ons', badge: 'Add-on', name: 'Baquarta', prices: { Single: 'Rs. 700' } }
    ];

    const categories = [
      'All', 'Family Packs', 'Sawans', 'Basmathi', 'Keeri Samba', 'Cheese Kottu', 'Bites', 'Kottu', 'Noodles', 'Biriyani', 'Rice & Curry', 'Omelets', 'Sides', 'Party Packs', 'Add-ons'
    ];

    let activeCategory = 'All';
    const categoryList = document.getElementById('categoryList');
    const menuGrid = document.getElementById('menuGrid');
    const searchInput = document.getElementById('searchInput');
    const loadingScreen = document.getElementById('loadingScreen');

    function showLoading() {
      loadingScreen.classList.add('visible');
    }

    function hideLoading() {
      loadingScreen.classList.remove('visible');
    }

    function createCategoryButtons() {
      categories.forEach(category => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'category-btn' + (category === activeCategory ? ' active' : '');
        button.textContent = category;
        button.addEventListener('click', () => {
          activeCategory = category;
          updateActiveCategory();
          renderMenu();
        });
        categoryList.append(button);
      });
    }

    function updateActiveCategory() {
      const buttons = categoryList.querySelectorAll('.category-btn');
      buttons.forEach(btn => btn.classList.toggle('active', btn.textContent === activeCategory));
    }

    function renderMenu() {
      const term = searchInput.value.trim().toLowerCase();
      const filtered = menuItems.filter(item => {
        const matchesCategory = activeCategory === 'All' || item.category === activeCategory;
        const content = `${item.name} ${item.category} ${item.badge || ''} ${item.description || ''}`.toLowerCase();
        const matchesSearch = !term || content.includes(term);
        return matchesCategory && matchesSearch;
      });

      const grouped = filtered.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});

      menuGrid.innerHTML = '';

      if (!filtered.length) {
        const noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.textContent = 'No items match your search. Try another keyword or category.';
        menuGrid.append(noResults);
        return;
      }

      Object.entries(grouped).forEach(([category, items]) => {
        const section = document.createElement('section');
        section.className = 'category-section';

        const header = document.createElement('div');
        header.className = 'category-header';

        const title = document.createElement('h2');
        title.className = 'category-title-section';
        title.textContent = category;

        const meta = document.createElement('span');
        meta.className = 'category-meta';
        meta.textContent = `${items.length} item${items.length > 1 ? 's' : ''}`;

        header.append(title, meta);
        section.append(header);

        const cardGrid = document.createElement('div');
        cardGrid.className = 'category-cards';

        items.forEach(item => {
          const card = document.createElement('article');
          card.className = 'dish-card';

          const tag = document.createElement('span');
          tag.className = 'dish-tag';
          tag.textContent = item.badge || item.category;
          card.append(tag);

          const title = document.createElement('h3');
          title.className = 'dish-name';
          title.textContent = item.name;
          card.append(title);

          if (item.description) {
            const description = document.createElement('p');
            description.className = 'dish-description';
            description.textContent = item.description;
            card.append(description);
          }

          const priceGrid = document.createElement('div');
          priceGrid.className = 'price-grid';

          Object.entries(item.prices).forEach(([label, value]) => {
            const pill = document.createElement('div');
            pill.className = 'price-pill';
            pill.innerHTML = `<span class="size-name">${label}</span><span class="size-value">${value}</span>`;
            priceGrid.append(pill);
          });

          card.append(priceGrid);
          cardGrid.append(card);
        });

        section.append(cardGrid);
        menuGrid.append(section);
      });
    }

    searchInput.addEventListener('input', renderMenu);

    window.addEventListener('load', () => {
      showLoading();
      setTimeout(() => {
        createCategoryButtons();
        renderMenu();
        hideLoading();
      }, 750);
    });
  </script>
</body>
</html>
